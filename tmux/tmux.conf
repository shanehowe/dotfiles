set -g mouse on
setw -g mode-keys vi

# Set prefix to §
unbind C-b
set -g prefix '§'
bind '§' send-prefix

# Resize panes with prefix+Shift+HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Status bar
set -g status on
set -g status-interval 60
set -g status-position bottom
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 20

# Apply Catppuccin theme (Mocha/Latte) based on macOS appearance
run-shell "$HOME/dotfiles/tmux/scripts/apply-theme.sh"
set-hook -g client-focus-in "run-shell $HOME/dotfiles/tmux/scripts/apply-theme.sh"
